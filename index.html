<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smeetz POS — AI Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--surface3:#2e2e2e;
    --accent:#ff6b35;--accent2:#ffb347;--text:#f0ede8;--muted:#888;--border:#333;
    --green:#4ade80;--red:#f87171;--blue:#60a5fa;
  }
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .app{display:grid;grid-template-columns:1fr 340px;grid-template-rows:auto 1fr;height:100vh;max-height:100vh;overflow:hidden}
  .header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--surface)}
  .logo{font-family:'Space Mono',monospace;font-size:13px;color:var(--accent);letter-spacing:2px;text-transform:uppercase}
  .status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .main{display:flex;flex-direction:column;padding:16px;gap:12px;overflow:hidden}
  .products-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;overflow-y:auto;flex:1}
  .product-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
  .product-card:hover{border-color:var(--accent);background:var(--surface2)}
  .product-card:active{transform:scale(.97)}
  .product-card.added{border-color:var(--green)}
  .product-emoji{font-size:26px;margin-bottom:8px;display:block}
  .product-name{font-size:13px;font-weight:500;margin-bottom:4px;line-height:1.3}
  .product-price{font-family:'Space Mono',monospace;font-size:14px;color:var(--accent);font-weight:700}
  .product-cat{font-size:11px;color:var(--muted);margin-bottom:6px}
  .sidebar{display:flex;flex-direction:column;border-left:1px solid var(--border);background:var(--surface);overflow:hidden}
  .cart-section{padding:14px;border-bottom:1px solid var(--border);flex:0 0 auto}
  .cart-title{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:10px;font-family:'Space Mono',monospace}
  .cart-items{display:flex;flex-direction:column;gap:6px;max-height:160px;overflow-y:auto}
  .cart-item{display:flex;align-items:center;justify-content:space-between;font-size:13px;padding:6px 8px;background:var(--surface2);border-radius:6px}
  .cart-item-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cart-item-price{font-family:'Space Mono',monospace;font-size:12px;color:var(--accent2);margin-left:8px;white-space:nowrap}
  .cart-item-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0 0 0 6px;line-height:1}
  .cart-item-remove:hover{color:var(--red)}
  .cart-empty{font-size:12px;color:var(--muted);text-align:center;padding:12px}
  .cart-total{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
  .total-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  .total-amount{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;color:var(--text)}
  .checkout-btn{width:100%;margin-top:10px;padding:11px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s}
  .checkout-btn:hover{opacity:.85}
  .checkout-btn:disabled{opacity:.4;cursor:default}
  .ai-section{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .ai-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
  .ai-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#ff6b35,#ffb347);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
  .ai-name{font-size:12px;font-weight:500}
  .ai-sub{font-size:11px;color:var(--muted)}
  .ai-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
  .msg{max-width:90%;font-size:12.5px;line-height:1.5;padding:8px 11px;border-radius:10px}
  .msg.bot{background:var(--surface2);color:var(--text);align-self:flex-start;border-bottom-left-radius:3px}
  .msg.user{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:3px;max-width:80%}
  .msg.loading{background:var(--surface2);align-self:flex-start}
  .typing-dots{display:flex;gap:4px;padding:2px 0}
  .typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:typing .9s infinite}
  .typing-dots span:nth-child(2){animation-delay:.2s}
  .typing-dots span:nth-child(3){animation-delay:.4s}
  @keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
  .ai-input-row{display:flex;gap:6px;padding:10px 12px;border-top:1px solid var(--border)}
  .ai-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:12.5px;color:var(--text);font-family:'DM Sans',sans-serif;resize:none;height:36px;outline:none}
  .ai-input:focus{border-color:var(--accent)}
  .ai-send{background:var(--accent);border:none;border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity .15s;flex-shrink:0}
  .ai-send:hover{opacity:.85}
  .ai-send svg{width:15px;height:15px;fill:#fff}
  .quick-btns{display:flex;flex-wrap:wrap;gap:5px;padding:0 12px 8px}
  .quick-btn{background:none;border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap}
  .quick-btn:hover{border-color:var(--accent);color:var(--accent)}
  .filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;flex-shrink:0}
  .filter-row::-webkit-scrollbar{display:none}
  .filter-btn{background:none;border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;font-family:'DM Sans',sans-serif}
  .filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .notification{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100}
  .notification.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">⚡ Smeetz POS</div>
    <div style="display:flex;align-items:center;gap:16px">
      <span style="font-size:12px;color:var(--muted);font-family:'Space Mono',monospace" id="time"></span>
      <div class="status"><div class="dot"></div><span>Claude online</span></div>
    </div>
  </div>

  <div class="main">
    <div class="filter-row" id="filters"></div>
    <div class="products-grid" id="products"></div>
  </div>

  <div class="sidebar">
    <div class="cart-section">
      <div class="cart-title">Current order</div>
      <div class="cart-items" id="cart-items">
        <div class="cart-empty">No items yet</div>
      </div>
      <div class="cart-total">
        <span class="total-label">Total</span>
        <span class="total-amount" id="total">CHF 0.00</span>
      </div>
      <button class="checkout-btn" id="checkout-btn" disabled onclick="checkout()">Checkout →</button>
    </div>

    <div class="ai-section">
      <div class="ai-header">
        <div class="ai-avatar">✦</div>
        <div>
          <div class="ai-name">Claude Assistant</div>
          <div class="ai-sub">Ask me anything about products</div>
        </div>
      </div>
      <div class="ai-messages" id="ai-messages">
        <div class="msg bot">Hi! I'm your POS assistant. Ask me about products, upsell tips, or anything else. 👋</div>
      </div>
      <div class="quick-btns" id="quick-btns">
        <button class="quick-btn" onclick="quickAsk('What should I upsell right now?')">Upsell tip</button>
        <button class="quick-btn" onclick="quickAsk('What are our most popular products?')">Top sellers</button>
        <button class="quick-btn" onclick="quickAsk('Any combo deals I can offer?')">Combos</button>
        <button class="quick-btn" onclick="quickAsk('Customer looks undecided, what do I recommend?')">Help decide</button>
      </div>
      <div class="ai-input-row">
        <textarea class="ai-input" id="ai-input" placeholder="Ask Claude..." onkeydown="handleKey(event)"></textarea>
        <button class="ai-send" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<div class="notification" id="notif"></div>

<script>
const PRODUCTS = [
  {id:1,name:'Day Pass – Adult',price:29.00,emoji:'🎟️',cat:'Tickets'},
  {id:2,name:'Day Pass – Child',price:18.00,emoji:'🎟️',cat:'Tickets'},
  {id:3,name:'Season Pass',price:149.00,emoji:'⭐',cat:'Tickets'},
  {id:4,name:'Family Bundle (4)',price:89.00,emoji:'👨‍👩‍👧‍👦',cat:'Tickets'},
  {id:5,name:'Ski Rental – Full',price:45.00,emoji:'🎿',cat:'Equipment'},
  {id:6,name:'Helmet Rental',price:12.00,emoji:'⛑️',cat:'Equipment'},
  {id:7,name:'Locker – Full Day',price:8.00,emoji:'🔒',cat:'Services'},
  {id:8,name:'Ski Lesson – 1h',price:55.00,emoji:'🏔️',cat:'Services'},
  {id:9,name:'Hot Chocolate',price:4.50,emoji:'☕',cat:'F&B'},
  {id:10,name:'Lunch Combo',price:18.00,emoji:'🍽️',cat:'F&B'},
  {id:11,name:'Energy Bar',price:3.50,emoji:'🍫',cat:'F&B'},
  {id:12,name:'Gift Card CHF 50',price:50.00,emoji:'🎁',cat:'Other'},
];

let cart = [];
let activeFilter = 'All';
const cats = ['All', ...new Set(PRODUCTS.map(p => p.cat))];

function renderFilters(){
  const el = document.getElementById('filters');
  el.innerHTML = cats.map(c=>`<button class="filter-btn ${c===activeFilter?'active':''}" onclick="setFilter('${c}')">${c}</button>`).join('');
}

function setFilter(cat){
  activeFilter = cat;
  renderFilters();
  renderProducts();
}

function renderProducts(){
  const filtered = activeFilter==='All' ? PRODUCTS : PRODUCTS.filter(p=>p.cat===activeFilter);
  document.getElementById('products').innerHTML = filtered.map(p=>`
    <div class="product-card" onclick="addToCart(${p.id})" id="pc-${p.id}">
      <span class="product-emoji">${p.emoji}</span>
      <div class="product-cat">${p.cat}</div>
      <div class="product-name">${p.name}</div>
      <div class="product-price">CHF ${p.price.toFixed(2)}</div>
    </div>
  `).join('');
}

function addToCart(id){
  const p = PRODUCTS.find(x=>x.id===id);
  const existing = cart.find(x=>x.id===id);
  if(existing) existing.qty++;
  else cart.push({...p, qty:1});
  renderCart();
  const card = document.getElementById('pc-'+id);
  if(card){card.classList.add('added');setTimeout(()=>card.classList.remove('added'),400);}
}

function removeFromCart(id){
  cart = cart.filter(x=>x.id!==id);
  renderCart();
}

function renderCart(){
  const el = document.getElementById('cart-items');
  if(!cart.length){el.innerHTML='<div class="cart-empty">No items yet</div>';}
  else{
    el.innerHTML = cart.map(i=>`
      <div class="cart-item">
        <span class="cart-item-name">${i.qty>1?i.qty+'× ':''} ${i.name}</span>
        <span class="cart-item-price">CHF ${(i.price*i.qty).toFixed(2)}</span>
        <button class="cart-item-remove" onclick="removeFromCart(${i.id})">✕</button>
      </div>
    `).join('');
  }
  const total = cart.reduce((s,i)=>s+i.price*i.qty,0);
  document.getElementById('total').textContent = 'CHF '+total.toFixed(2);
  document.getElementById('checkout-btn').disabled = cart.length===0;
}

function checkout(){
  showNotif('✓ Order completed! CHF '+cart.reduce((s,i)=>s+i.price*i.qty,0).toFixed(2));
  cart=[];
  renderCart();
}

function showNotif(msg){
  const n=document.getElementById('notif');
  n.textContent=msg;n.classList.add('show');
  setTimeout(()=>n.classList.remove('show'),2500);
}

function updateTime(){
  const now=new Date();
  document.getElementById('time').textContent=now.toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'});
}
setInterval(updateTime,1000);updateTime();

async function sendMessage(){
  const input=document.getElementById('ai-input');
  const text=input.value.trim();
  if(!text)return;
  input.value='';
  appendMsg(text,'user');
  const loadId=appendLoading();

  const cartSummary = cart.length
    ? 'Current cart: '+cart.map(i=>`${i.qty}x ${i.name} (CHF ${(i.price*i.qty).toFixed(2)})`).join(', ')+'. Total: CHF '+cart.reduce((s,i)=>s+i.price*i.qty,0).toFixed(2)
    : 'Cart is empty.';

  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': 'YOUR_API_KEY_HERE',
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:`You are a helpful POS assistant at a leisure/entertainment venue (Smeetz). You help cashiers with product knowledge, upsell suggestions, and customer service tips. Be concise (2-4 sentences max), practical, and friendly. Available products: ${PRODUCTS.map(p=>`${p.name} CHF ${p.price}`).join(', ')}. ${cartSummary}`,
        messages:[{role:'user',content:text}]
      })
    });
    const data=await res.json();
    removeLoading(loadId);
    const reply=data.content?.find(b=>b.type==='text')?.text||'Sorry, no response.';
    appendMsg(reply,'bot');
  }catch(e){
    removeLoading(loadId);
    appendMsg('Connection error. Please try again.','bot');
  }
}

function quickAsk(q){
  document.getElementById('ai-input').value=q;
  sendMessage();
}

function appendMsg(text,role){
  const el=document.getElementById('ai-messages');
  const div=document.createElement('div');
  div.className='msg '+role;
  div.textContent=text;
  el.appendChild(div);
  el.scrollTop=el.scrollHeight;
}

function appendLoading(){
  const el=document.getElementById('ai-messages');
  const id='load-'+Date.now();
  const div=document.createElement('div');
  div.className='msg loading';div.id=id;
  div.innerHTML='<div class="typing-dots"><span></span><span></span><span></span></div>';
  el.appendChild(div);el.scrollTop=el.scrollHeight;
  return id;
}

function removeLoading(id){
  const el=document.getElementById(id);
  if(el)el.remove();
}

function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
}

renderFilters();
renderProducts();
</script>
</body>
</html>
